<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; font-family: 'Segoe UI', Arial, sans-serif; background: #f6f8fa; color: #1d2b3a; overflow: hidden; }
  .card { position: relative; width: 1200px; height: 630px; padding: 72px 84px; display: flex; flex-direction: column; }
  .top { display: flex; align-items: center; gap: 18px; }
  .mark { width: 64px; height: 64px; border-radius: 16px; background: #1d2b3a; display: flex; align-items: center; justify-content: center; gap: 7px; }
  .mark i { width: 13px; height: 13px; border-radius: 50%; display: block; }
  .brand { font-size: 30px; font-weight: 700; }
  h1 { margin-top: 74px; font-size: 74px; line-height: 1.08; font-weight: 700; letter-spacing: -1.5px; max-width: 950px; }
  h1 em { font-style: normal; color: #2e7d5b; }
  .sub { margin-top: 26px; font-size: 30px; color: #46586a; max-width: 900px; }
  .flow { margin-top: auto; display: flex; gap: 14px; align-items: center; font-size: 26px; font-weight: 600; }
  .step { display: flex; align-items: center; gap: 12px; background: #fff; border: 2px solid #e4e9ee; border-radius: 16px; padding: 14px 26px; }
  .step i { width: 16px; height: 16px; border-radius: 50%; display: block; }
  .arrow { color: #7d8ea0; font-size: 30px; }
  .tag { position: absolute; top: 72px; right: 84px; background: #fff6e4; border: 2px solid #f0dcae; color: #8a6116; font-size: 22px; font-weight: 600; padding: 10px 24px; border-radius: 999px; }
  .url { position: absolute; bottom: 30px; right: 84px; font-size: 22px; color: #7d8ea0; }
</style></head><body>
<div class="card">
  <div class="top">
    <div class="mark"><i style="background:#ff7a59"></i><i style="background:#2e7d5b"></i><i style="background:#4553c2"></i></div>
    <div class="brand">CRM Portfolio</div>
  </div>
  <div class="tag">Sample projects · fictional data</div>
  <h1>Three working CRM samples.<br><em>One engagement story.</em></h1>
  <p class="sub">Not screenshots — real, clickable apps where every number is computed live.</p>
  <div class="flow">
    <div class="step"><i style="background:#2e7d5b"></i>Migrate</div><span class="arrow">→</span>
    <div class="step"><i style="background:#ff7a59"></i>Build</div><span class="arrow">→</span>
    <div class="step"><i style="background:#4553c2"></i>Onboard</div>
  </div>
  <div class="url">rounaksingh890.github.io/crm-portfolio</div>
</div>
</body></html>
