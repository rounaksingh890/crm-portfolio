<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  /* image source for a social card — single system font is intentional (headless render) */
  * { margin: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; font-family: 'Segoe UI', Arial, sans-serif; background: #f5f6fb; color: #252a41; overflow: hidden; }
  .card { position: relative; width: 1200px; height: 630px; padding: 72px 84px; display: flex; }
  .left { flex: 1; display: flex; flex-direction: column; }
  .top { display: flex; align-items: center; gap: 18px; }
  .mark { width: 64px; height: 64px; border-radius: 16px; background: #4553c2; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; }
  .brand { font-size: 30px; font-weight: 700; }
  h1 { margin-top: 46px; font-size: 66px; line-height: 1.1; font-weight: 700; letter-spacing: -1.5px; max-width: 640px; }
  h1 em { font-style: normal; color: #4553c2; }
  .sub { margin-top: 24px; font-size: 28px; color: #4d5470; max-width: 620px; line-height: 1.4; }
  .rows { margin-top: auto; display: grid; gap: 12px; max-width: 520px; }
  .row { display: flex; align-items: center; gap: 14px; background: #fff; border: 2px solid #e3e6f2; border-radius: 14px; padding: 13px 20px; font-size: 23px; font-weight: 600; color: #4d5470; }
  .row i { width: 26px; height: 26px; border-radius: 8px; border: 3px solid #c3c9e2; display: block; flex: none; }
  .row.done { color: #8a90ab; text-decoration: line-through; }
  .row.done i { background: #1e8a68; border-color: #1e8a68; }
  .ringwrap { width: 340px; display: flex; align-items: center; justify-content: center; }
  .tag { position: absolute; top: 72px; right: 84px; background: #fff6e4; border: 2px solid #f0dcae; color: #8a6116; font-size: 22px; font-weight: 600; padding: 10px 24px; border-radius: 999px; }
  .url { position: absolute; bottom: 30px; right: 84px; font-size: 22px; color: #8a90ab; }
  .ring-label { font-size: 24px; fill: #8a90ab; font-weight: 600; }
  .ring-num { font-size: 74px; fill: #252a41; font-weight: 700; }
</style></head><body>
<div class="card">
  <div class="left">
    <div class="top"><div class="mark">✓</div><div class="brand">Client onboarding portal</div></div>
    <h1>One link where the <em>whole project</em> lives.</h1>
    <p class="sub">The plan, your to-dos, approvals and billing — with a progress ring that can't lie.</p>
    <div class="rows">
      <div class="row done"><i></i>Send the customer spreadsheet</div>
      <div class="row"><i></i>Approve the patient pipeline</div>
    </div>
  </div>
  <div class="ringwrap">
    <svg width="320" height="320" viewBox="0 0 320 320">
      <circle cx="160" cy="160" r="128" fill="none" stroke="#e6e9f5" stroke-width="30"/>
      <circle cx="160" cy="160" r="128" fill="none" stroke="#4553c2" stroke-width="30" stroke-linecap="round"
        stroke-dasharray="500 804" transform="rotate(-90 160 160)"/>
      <text x="160" y="172" text-anchor="middle" class="ring-num">62%</text>
      <text x="160" y="212" text-anchor="middle" class="ring-label">complete</text>
    </svg>
  </div>
  <div class="tag">Sample · fictional data</div>
  <div class="url">rounaksingh890.github.io/crm-portfolio</div>
</div>
</body></html>
